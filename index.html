<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocabMatch — Minimal Matching Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">◆</span>
        <span>VocabMatch</span>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-icon">🔥</span>
          <span class="stat-value" id="streak">0</span>
        </div>
        <div class="stat">
          <span class="stat-icon">✕</span>
          <span class="stat-value" id="mistakes">0</span>
        </div>
      </div>
    </header>

    <!-- Game Area -->
    <main class="main">
      <!-- Progress -->
      <div class="progress-section">
        <div class="level-badge" id="level-badge">Level 1</div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="match-count" id="match-count">0/6</div>
      </div>

      <!-- Card Grid -->
      <div class="card-grid" id="card-grid"></div>

      <!-- Message -->
      <div class="message" id="message"></div>
    </main>

    <!-- Win Overlay -->
    <div class="overlay" id="overlay">
      <div class="win-dialog">
        <div class="win-emoji">🎉</div>
        <h2 class="win-title">Level Complete!</h2>
        <p class="win-level" id="win-level">Level 1</p>
        <div class="win-stat-row">
          <span>Mistakes: <strong id="win-mistakes">0</strong></span>
        </div>
        <button class="btn-next" id="btn-next">Next Level →</button>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="js/vocab-data.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
